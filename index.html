<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SinHumo 🚭</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --card2: #16213e;
    --accent: #e94560; --green: #00d4aa; --gold: #ffd700;
    --text: #e8e8f0; --muted: #6b6b8a; --border: #2a2a4a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 16px; max-width: 430px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 800; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 8px; }
  .streak-badge { background: linear-gradient(135deg, #ff6b35, var(--gold)); border-radius: 20px; padding: 6px 14px; font-weight: 700; font-size: 0.85rem; color: #000; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
  .progress-section { text-align: center; padding: 24px 20px; }
  .arc-container { position: relative; display: inline-block; }
  svg.arc { transform: rotate(-90deg); }
  .arc-bg { fill: none; stroke: var(--border); stroke-width: 12; }
  .arc-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .arc-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .arc-num { font-size: 2.4rem; font-weight: 900; }
  .arc-label { font-size: 0.75rem; color: var(--muted); }
  .arc-sub { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  .cig-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
  .cig-btn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid var(--border); background: var(--card2); font-size: 1.3rem; cursor: pointer; transition: all 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
  .cig-btn.smoked { background: linear-gradient(135deg, #3a1a1a, #5a2020); border-color: var(--accent); opacity: 0.7; }
  .cig-btn.smoked::after { content: '✗'; position: absolute; font-size: 1.5rem; color: var(--accent); font-weight: 900; }
  .cig-btn:not(.smoked):not(.locked):hover { border-color: var(--accent); transform: scale(1.1); }
  .cig-btn.locked { opacity: 0.2; cursor: not-allowed; }
  .smoke-action { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .count-display { font-size: 0.9rem; color: var(--muted); }
  .count-display span { color: var(--text); font-weight: 700; }
  .undo-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .undo-btn:hover { border-color: var(--text); color: var(--text); }
  .xp-section { }
  .xp-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .xp-bar-bg { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
  .xp-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green), #00aaff); transition: width 0.5s ease; }
  .achievements { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .achievement { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
  .achievement.unlocked { border-color: var(--gold); background: linear-gradient(135deg, #1a1500, #2a2000); }
  .achievement .icon { font-size: 1.8rem; margin-bottom: 4px; }
  .achievement .name { font-size: 0.75rem; font-weight: 700; }
  .achievement .desc { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  .achievement.locked { opacity: 0.4; }
  .benefit-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .benefit-item:last-child { border-bottom: none; }
  .benefit-icon { font-size: 1.5rem; width: 36px; text-align: center; }
  .benefit-info { flex: 1; }
  .benefit-name { font-size: 0.9rem; font-weight: 600; }
  .benefit-time { font-size: 0.75rem; color: var(--muted); }
  .benefit-status { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .benefit-status.active { background: rgba(0,212,170,0.15); color: var(--green); }
  .benefit-status.pending { background: rgba(107,107,138,0.15); color: var(--muted); }
  .tabs { display: flex; gap: 4px; background: var(--card2); border-radius: 14px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; border: none; border-radius: 10px; background: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
  .tab.active { background: var(--card); color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .motivation { background: linear-gradient(135deg, #0d2137, #162040); border: 1px solid #1e3a5f; border-radius: 16px; padding: 16px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.5; color: #8bb8e8; font-style: italic; text-align: center; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--green); color: #000; padding: 10px 24px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; z-index: 999; transition: transform 0.4s ease; text-align: center; max-width: 320px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.danger { background: var(--accent); color: #fff; }
  .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
  .day-info { text-align: center; margin-bottom: 8px; }
  .day-num { font-size: 2rem; font-weight: 900; color: var(--green); }
  .day-label { font-size: 0.8rem; color: var(--muted); }
  .reset-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; width: 100%; margin-top: 8px; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <h1>SinHumo 🚭</h1>
  <div class="streak-badge" id="streakBadge">🔥 Día 0</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('hoy',this)">Hoy</button>
  <button class="tab" onclick="switchTab('logros',this)">Logros</button>
  <button class="tab" onclick="switchTab('salud',this)">Salud</button>
</div>
<div class="tab-content active" id="tab-hoy">
  <div class="card progress-section">
    <div class="day-info">
      <div class="day-num" id="dayNum">Comienza mañana</div>
      <div class="day-label" id="dayLabel">Preparado para el reto</div>
    </div>
    <div class="arc-container">
      <svg class="arc" width="160" height="160" viewBox="0 0 160 160">
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#00d4aa"/><stop offset="100%" style="stop-color:#00aaff"/></linearGradient></defs>
        <circle class="arc-bg" cx="80" cy="80" r="64"/>
        <circle class="arc-fill" id="arcFill" cx="80" cy="80" r="64" stroke-dasharray="402" stroke-dashoffset="402" stroke="url(#grad)"/>
      </svg>
      <div class="arc-center">
        <div class="arc-num" id="arcNum">—</div>
        <div class="arc-label" id="arcLabel"></div>
      </div>
    </div>
    <div class="arc-sub" id="arcSub">El viaje empieza mañana</div>
  </div>
  <div class="card" id="cigCard" style="display:none">
    <div class="section-title">Marca cada cigarro que fumes</div>
    <div class="cig-grid" id="cigGrid"></div>
    <div class="smoke-action">
      <div class="count-display">Fumados hoy: <span id="smokedCount">0</span></div>
      <button class="undo-btn" onclick="undoCig()">↩ Deshacer</button>
    </div>
  </div>
  <div class="card">
    <div class="xp-section">
      <div class="xp-label"><span>⚡ Nivel <span id="levelNum">1</span></span><span id="xpText">0 / 100 XP</span></div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="motivation" id="motivationBox">"El mejor momento para dejar de fumar es ahora. El segundo mejor momento también es ahora."</div>
</div>
<div class="tab-content" id="tab-logros">
  <div class="card">
    <div class="section-title">Tus logros</div>
    <div class="achievements" id="achievementGrid"></div>
  </div>
</div>
<div class="tab-content" id="tab-salud">
  <div class="card">
    <div class="section-title">Beneficios en tu organismo</div>
    <div id="benefitsList"></div>
  </div>
</div>
<button class="reset-btn" onclick="resetApp()">↺ Reiniciar app</button>
<script>
const START_CIGS = 20, REDUCE_EVERY = 2;
function defaultState() {
  const t = new Date(); t.setDate(t.getDate()+1); t.setHours(0,0,0,0);
  return { startDate: t.toISOString(), log: {}, xp: 0, level: 1, achievements: [] };
}
let state = (() => { try { const s = localStorage.getItem('sinhumo_v2'); return s ? JSON.parse(s) : defaultState(); } catch(e) { return defaultState(); } })();
function saveState() { localStorage.setItem('sinhumo_v2', JSON.stringify(state)); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysSinceStart() {
  const s = new Date(state.startDate), n = new Date();
  n.setHours(0,0,0,0); s.setHours(0,0,0,0);
  return Math.floor((n-s)/86400000);
}
function allowedToday() { const d = daysSinceStart(); return d < 0 ? START_CIGS : Math.max(0, START_CIGS - Math.floor(d/REDUCE_EVERY)); }
function smokedToday() { return state.log[today()] || 0; }
function hoursSmokeFree() { return Math.max(0, (new Date() - new Date(state.startDate)) / 3600000); }
const ADEFS = [
  {id:'first_day',icon:'🌅',name:'Primer día',desc:'Completa el primer día',check:()=>daysSinceStart()>=1},
  {id:'three_days',icon:'🥉',name:'3 días',desc:'3 días en el reto',check:()=>daysSinceStart()>=3},
  {id:'week',icon:'🏅',name:'Una semana',desc:'7 días sin rendirse',check:()=>daysSinceStart()>=7},
  {id:'two_weeks',icon:'🥈',name:'Dos semanas',desc:'14 días superados',check:()=>daysSinceStart()>=14},
  {id:'month',icon:'🥇',name:'Un mes',desc:'30 días de lucha',check:()=>daysSinceStart()>=30},
  {id:'half',icon:'✂️',name:'A la mitad',desc:'Reduces a 10 cigarros',check:()=>allowedToday()<=10},
  {id:'single',icon:'🔢',name:'Un dígito',desc:'Menos de 10 al día',check:()=>allowedToday()<10&&daysSinceStart()>=0},
  {id:'zero',icon:'🚭',name:'¡Libre!',desc:'Meta: 0 cigarros al día',check:()=>allowedToday()===0},
];
const BENEFITS = [
  {icon:'❤️',name:'Pulso y presión normales',hours:0.33,label:'20 min'},
  {icon:'🩸',name:'CO en sangre normalizado',hours:8,label:'8 horas'},
  {icon:'⚡',name:'Riesgo cardíaco reducido',hours:24,label:'24 horas'},
  {icon:'👃',name:'Olfato y gusto mejoran',hours:48,label:'48 horas'},
  {icon:'🫁',name:'Respirar se hace más fácil',hours:72,label:'3 días'},
  {icon:'🏃',name:'Circulación y energía mejoran',hours:336,label:'2 semanas'},
  {icon:'🌬️',name:'Pulmones se limpian',hours:2160,label:'3 meses'},
  {icon:'😮‍💨',name:'Tos y fatiga desaparecen',hours:8760,label:'1 año'},
  {icon:'💪',name:'Riesgo de cáncer -50%',hours:43800,label:'5 años'},
];
const QUOTES = [
  '"Cada cigarro que no fumas es una victoria."',
  '"Tu cuerpo te está agradeciendo ahora mismo."',
  '"La fuerza de voluntad es un músculo: cada día lo haces más fuerte."',
  '"No estás perdiendo algo. Estás ganando tu vida."',
  '"Un día a la vez. Hoy es suficiente."',
  '"El tabaco miente diciéndote que lo necesitas. No es verdad."',
];
function xpForLevel(l) { return l*100; }
function addXP(n) {
  state.xp += n;
  while (state.xp >= xpForLevel(state.level)) { state.xp -= xpForLevel(state.level); state.level++; showToast('⬆️ ¡Subiste al nivel '+state.level+'!'); }
  saveState();
}
function checkAchievements() {
  ADEFS.forEach(a => { if (!state.achievements.includes(a.id) && a.check()) { state.achievements.push(a.id); setTimeout(()=>showToast('🏆 Logro desbloqueado! '+a.icon+' '+a.name),300); addXP(50); saveState(); } });
}
let tt;
function showToast(msg, danger) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.className = 'toast show'+(danger?' danger':'');
  clearTimeout(tt); tt = setTimeout(()=>t.className='toast',3500);
}
function smokeCig(i) {
  const c = smokedToday(), a = allowedToday();
  if (i !== c) return;
  state.log[today()] = c+1;
  const left = a-(c+1);
  if (c+1 > a) showToast('⚠️ Has superado tu límite. ¡Mañana lo recuperas!', true);
  else if (left===0) { showToast('🎯 ¡Límite completado! Increíble fuerza de voluntad.'); addXP(20); }
  else if (left===1) showToast('⚡ Solo queda 1 cigarro. ¡Aguanta!');
  else addXP(5);
  saveState(); render();
}
function undoCig() { const c=smokedToday(); if(c<=0)return; state.log[today()]=c-1; saveState(); render(); }
function switchTab(tab,btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
}
function resetApp() { if(confirm('¿Reiniciar? Perderás tu progreso.')){ localStorage.removeItem('sinhumo_v2'); state=defaultState(); saveState(); render(); } }
function render() {
  const day=daysSinceStart(), allowed=allowedToday(), smoked=smokedToday(), started=day>=0, hours=hoursSmokeFree();
  document.getElementById('streakBadge').textContent='🔥 Día '+Math.max(0,day);
  const dn=document.getElementById('dayNum'), dl=document.getElementById('dayLabel');
  const af=document.getElementById('arcFill'), an=document.getElementById('arcNum'), al=document.getElementById('arcLabel'), as_=document.getElementById('arcSub');
  if (!started) {
    dn.textContent='Comienza mañana'; dl.textContent='Preparado para el reto';
    af.style.strokeDashoffset=402; an.textContent='—'; al.textContent=''; as_.textContent='El viaje empieza mañana';
    document.getElementById('cigCard').style.display='none';
  } else if (allowed===0) {
    dn.textContent='Día '+(day+1); dl.textContent='¡Meta conseguida! 0 cigarros';
    af.style.strokeDashoffset=0; af.style.stroke='#00d4aa';
    an.textContent='🚭'; al.textContent='¡Libre!'; as_.textContent=(day+1)+' días sin fumar';
    document.getElementById('cigCard').style.display='none';
  } else {
    dn.textContent='Día '+(day+1); dl.textContent='Límite hoy: '+allowed+' cigarro'+(allowed!==1?'s':'');
    const remaining=Math.max(0,allowed-smoked), pct=remaining/allowed;
    af.style.strokeDashoffset=402*(1-pct);
    af.style.stroke=pct>0.5?'#00d4aa':pct>0.2?'#ffd700':'#e94560';
    an.textContent=remaining; al.textContent='restantes';
    as_.textContent=smoked+' fumado'+(smoked!==1?'s':'')+' de '+allowed+' permitidos';
    document.getElementById('cigCard').style.display='block';
    document.getElementById('smokedCount').textContent=smoked;
    const g=document.getElementById('cigGrid'); g.innerHTML='';
    const total=Math.max(allowed,smoked);
    for(let i=0;i<total;i++){
      const b=document.createElement('button'); b.className='cig-btn'; b.innerHTML='🚬';
      if(i<smoked)b.classList.add('smoked');
      else if(i<allowed){const ii=i;b.onclick=()=>smokeCig(ii);}
      else b.classList.add('locked');
      g.appendChild(b);
    }
  }
  const xn=xpForLevel(state.level);
  document.getElementById('levelNum').textContent=state.level;
  document.getElementById('xpText').textContent=state.xp+' / '+xn+' XP';
  document.getElementById('xpBar').style.width=(state.xp/xn*100)+'%';
  document.getElementById('motivationBox').textContent=QUOTES[Math.floor(Date.now()/3600000)%QUOTES.length];
  const ag=document.getElementById('achievementGrid'); ag.innerHTML='';
  ADEFS.forEach(a=>{const u=state.achievements.includes(a.id);const d=document.createElement('div');d.className='achievement '+(u?'unlocked':'locked');d.innerHTML='<div class="icon">'+a.icon+'</div><div class="name">'+a.name+'</div><div class="desc">'+a.desc+'</div>';ag.appendChild(d);});
  const bl=document.getElementById('benefitsList'); bl.innerHTML='';
  BENEFITS.forEach(b=>{const active=hours>=b.hours&&started;const d=document.createElement('div');d.className='benefit-item';d.innerHTML='<div class="benefit-icon">'+b.icon+'</div><div class="benefit-info"><div class="benefit-name">'+b.name+'</div><div class="benefit-time">A partir de: '+b.label+'</div></div><div class="benefit-status '+(active?'active':'pending')+'">'+(active?'✓ Activo':b.label)+'</div>';bl.appendChild(d);});
  checkAchievements();
}
render();
setInterval(render,60000);
</script>
</body>
</html>
